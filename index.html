<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pontos para DXF</title>

<style>
body{
  font-family: Arial;
  padding:20px;
  background:#f4f4f4;
}

h2{
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse: collapse;
  background:white;
}

th, td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

input{
  width:95%;
}

button{
  margin:10px 5px 10px 0;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>Gerador de Pontos DXF</h2>

<button onclick="addRow()">Adicionar Linha</button>
<button onclick="exportDXF()">Exportar DXF</button>

<table id="tabela">
<thead>
<tr>
<th>Nome</th>
<th>X</th>
<th>Y</th>
<th>Z</th>
</tr>
</thead>
<tbody>
<tr>
<td><input value="P1"></td>
<td><input type="number" value="0"></td>
<td><input type="number" value="0"></td>
<td><input type="number" value="0"></td>
</tr>
</tbody>
</table>

<script>
function addRow(){
  const tbody = document.querySelector("#tabela tbody");
  const rowCount = tbody.rows.length + 1;
  const row = tbody.insertRow();

  // Nome
  let cell = row.insertCell();
  let nome = document.createElement("input");
  nome.value = "P" + rowCount;
  cell.appendChild(nome);

  // X Y Z
  for(let i=0;i<3;i++){
    cell = row.insertCell();
    let input = document.createElement("input");
    input.type="number";
    input.value="0";
    cell.appendChild(input);
  }
}

function exportDXF(){

  const rows = document.querySelectorAll("#tabela tbody tr");

  let dxf = "";

  // HEADER mínimo compatível R12
  dxf += "0\nSECTION\n2\nHEADER\n0\nENDSEC\n";
  dxf += "0\nSECTION\n2\nTABLES\n0\nENDSEC\n";
  dxf += "0\nSECTION\n2\nBLOCKS\n0\nENDSEC\n";
  dxf += "0\nSECTION\n2\nENTITIES\n";

  rows.forEach(row=>{
    const nome = row.cells[0].children[0].value || "";
    const x = parseFloat(row.cells[1].children[0].value) || 0;
    const y = parseFloat(row.cells[2].children[0].value) || 0;
    const z = parseFloat(row.cells[3].children[0].value) || 0;

    // POINT
    dxf += "0\nPOINT\n8\n0\n";
    dxf += "10\n"+x+"\n20\n"+y+"\n30\n"+z+"\n";

    // TEXT
    if(nome.trim() !== ""){
      dxf += "0\nTEXT\n8\n0\n";
      dxf += "10\n"+(x+0.5)+"\n20\n"+(y+0.5)+"\n30\n"+z+"\n";
      dxf += "40\n2\n1\n"+nome+"\n";
    }
  });

  dxf += "0\nENDSEC\n0\nEOF";

  const blob = new Blob([dxf], {type:"application/dxf"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "pontos.dxf";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
